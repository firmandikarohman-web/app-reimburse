<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Reimbursement Pintar (AI) Polri</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body>
    <div class="auth-container">
        <!-- Login Card -->
        <div id="login-section" class="auth-card">
            <div id="auth-header-icon" class="auth-logo">
                <i class="ph-fill ph-shield-check"></i>
            </div>
            <h2 id="auth-title">Presisi Reimburse</h2>
            <p id="auth-subtitle">Sistem Pengajuan Mandiri Personel Polri</p>

            <form id="login-form">
                <div class="form-group">
                    <label>NRP Personel</label>
                    <input type="text" id="nrp" placeholder="Masukkan NRP" required>
                </div>
                <div class="form-group">
                    <label>Kata Sandi</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" id="login-btn" class="btn-primary">Masuk ke Sistem</button>
            </form>

            <div style="margin-top: 20px; display: flex; flex-direction: column; gap: 10px;">
                <button id="toggle-register-btn" class="btn-link" onclick="toggleAuth()">Belum punya akun? Daftar di
                    sini</button>
                <button id="toggle-admin-btn" class="btn-link" style="color: var(--text-secondary); font-size: 0.8rem;"
                    onclick="toggleAdminMode()">Login sebagai Admin Keuangan</button>
            </div>
        </div>

        <!-- Register Card (Hidden by default) -->
        <div id="register-section" class="auth-card" style="display: none;">
            <div class="auth-logo">
                <i class="ph-fill ph-user-plus"></i>
            </div>
            <h2 id="reg-title">Daftar Akun Personel</h2>
            <p id="reg-subtitle">Bergabung dengan Ekosistem Digital Polri</p>

            <form id="register-form">
                <div class="form-group">
                    <label>NRP</label>
                    <input type="text" id="reg-nrp" placeholder="Masukkan NRP" required>
                </div>
                <div class="form-group">
                    <label>Nama Lengkap</label>
                    <input type="text" id="reg-nama" placeholder="Nama sesuai KTA" required>
                </div>
                <div class="form-group">
                    <label>Pangkat / Satker</label>
                    <input type="text" id="reg-pangkat" placeholder="Contoh: Bripka / Satreskrim" required>
                </div>
                <div class="form-group">
                    <label>Kata Sandi</label>
                    <input type="password" id="reg-password" placeholder="Buat kata sandi" required>
                </div>
                <button type="submit" class="btn-primary">Daftar Sekarang</button>
            </form>

            <button class="btn-link" onclick="toggleAuth()">Sudah punya akun? Login</button>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        // Check if already logged in
        if (localStorage.getItem("token")) {
            window.location.href = "dashboard.html";
        }

        let isAdminMode = false;

        function toggleAuth() {
            const loginSection = document.getElementById('login-section');
            const registerSection = document.getElementById('register-section');
            if (loginSection.style.display === 'none') {
                loginSection.style.display = 'block';
                registerSection.style.display = 'none';
            } else {
                loginSection.style.display = 'none';
                registerSection.style.display = 'block';
            }
        }

        function toggleAdminMode() {
            isAdminMode = !isAdminMode;
            const logo = document.getElementById('auth-header-icon');
            const title = document.getElementById('auth-title');
            const subtitle = document.getElementById('auth-subtitle');
            const toggleBtn = document.getElementById('toggle-admin-btn');
            const regBtn = document.getElementById('toggle-register-btn');
            const loginBtn = document.getElementById('login-btn');

            const regTitle = document.getElementById('reg-title');
            const regSubtitle = document.getElementById('reg-subtitle');

            if (isAdminMode) {
                logo.style.color = "#C62828"; // Redish for Admin
                title.innerText = "Admin Keuangan";
                subtitle.innerText = "Akses Otoritas Manajemen Anggaran";
                toggleBtn.innerText = "Kembali ke Login Personel";
                regBtn.innerText = "Daftar Akun Admin Keuangan";
                regTitle.innerText = "Daftar Akun Admin";
                regSubtitle.innerText = "Registrasi Otoritas Manajemen Keuangan";
                loginBtn.style.backgroundColor = "#C62828";
            } else {
                logo.style.color = "var(--primary-color)";
                title.innerText = "Presisi Reimburse";
                subtitle.innerText = "Sistem Pengajuan Mandiri Personel Polri";
                toggleBtn.innerText = "Login sebagai Admin Keuangan";
                regBtn.innerText = "Belum punya akun? Daftar di sini";
                regTitle.innerText = "Daftar Akun Personel";
                regSubtitle.innerText = "Bergabung dengan Ekosistem Digital Polri";
                loginBtn.style.backgroundColor = "var(--primary-color)";
            }
        }
    </script>
</body>

</html>

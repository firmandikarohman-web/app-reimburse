<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buat Pengajuan - Reimbursement Polri</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body>
    <header>
        <div class="header-container">
            <h1 style="font-size: 1.5rem; display: flex; align-items: center; gap: 10px;">
                <i class="ph-bold ph-plus-circle"></i> Pengajuan Baru
            </h1>
            <a href="dashboard.html" class="btn-link" style="color: white;">Batal</a>
        </div>
    </header>

    <main style="margin-top: 20px;">
        <div class="list-container" style="padding: 30px;">
            <form id="reimburse-form">
                <div class="form-group">
                    <label>Anggaran Kegiatan</label>
                    <select id="budget-id" required>
                        <option value="1">Giat Satker A - Rp 10.000.000</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Nominal Diajukan (Rp)</label>
                    <input type="number" id="nominal" placeholder="Contoh: 150000" required>
                </div>
                <div class="form-group">
                    <label>Metode Laporan</label>
                    <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                        <button type="button" id="btn-with-receipt" class="nav-tab active"
                            onclick="setReceipt(true)">Pakai Kuitansi (AI)</button>
                        <button type="button" id="btn-no-receipt" class="nav-tab" onclick="setReceipt(false)">Tanpa
                            Kuitansi</button>
                    </div>
                </div>

                <div id="receipt-upload-section" class="form-group">
                    <label>Unggah Gambar Kuitansi / Bukti</label>
                    <input type="file" id="foto" accept="image/*">
                    <p style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 5px;">
                        <i class="ph ph-info"></i> Pastikan gambar kuitansi terlihat jelas untuk fitur Verifikasi AI.
                    </p>
                </div>

                <div style="margin-top: 30px;">
                    <button type="submit" class="btn-primary save-btn">
                        Kirim Laporan
                    </button>
                    <p style="text-align: center; margin-top: 15px; font-size: 0.85rem; color: var(--text-secondary);">
                        Keamanan data dijamin sesuai standar Mabes Polri.
                    </p>
                </div>
            </form>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script>
        let useReceipt = true;
        function setReceipt(val) {
            useReceipt = val;
            const btnWith = document.getElementById('btn-with-receipt');
            const btnNo = document.getElementById('btn-no-receipt');
            const uploadSection = document.getElementById('receipt-upload-section');
            const fotoInput = document.getElementById('foto');

            if (val) {
                btnWith.classList.add('active');
                btnNo.classList.remove('active');
                uploadSection.style.display = 'block';
                fotoInput.required = true;
            } else {
                btnNo.classList.add('active');
                btnWith.classList.remove('active');
                uploadSection.style.display = 'none';
                fotoInput.required = false;
                fotoInput.value = "";
            }
        }
        // Initialize
        setReceipt(true);
    </script>
</body>

</html>
